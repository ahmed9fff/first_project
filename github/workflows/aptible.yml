name: aptible
on:
  push:
    branches: [main] # سيتم النشر عند رفع أي ملف لفرع main
  workflow_dispatch: {} # يضيف زر "نشر يدوي"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Deploy to Aptible
      uses: aptible/aptible-deploy-action@v4
      with:
        type: git
        app: pocdgroup
        environment: first_env2
        username: ${{ secrets.APTIBLE_USERNAME }}
        password: ${{ secrets.APTIBLE_PASSWORD }}
